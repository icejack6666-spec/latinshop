# ============================================================
# 000-default.conf — Apache VirtualHost — Latin Shop
# ============================================================
<VirtualHost *:80>
    ServerAdmin webmaster@latln-shop.com
    DocumentRoot /var/www/html

    # ─── Logs ──────────────────────────────────────────────
    ErrorLog  /var/www/html/logs/apache_error.log
    CustomLog /var/www/html/logs/apache_access.log combined

    # ─── Directorio raíz ───────────────────────────────────
    <Directory /var/www/html>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted

        # Forzar charset UTF-8
        AddDefaultCharset UTF-8
    </Directory>

    # ─── Bloquear acceso a directorios sensibles ───────────
    <DirectoryMatch "^/var/www/html/(config|includes|database|logs|cache|\.git)">
        Require all denied
    </DirectoryMatch>

    # ─── Headers de seguridad base ─────────────────────────
    <IfModule mod_headers.c>
        Header always set X-Frame-Options "SAMEORIGIN"
        Header always set X-Content-Type-Options "nosniff"
        Header always set Referrer-Policy "strict-origin-when-cross-origin"
        Header always unset X-Powered-By
        Header always unset Server
    </IfModule>

    # ─── Compresión ────────────────────────────────────────
    <IfModule mod_deflate.c>
        AddOutputFilterByType DEFLATE text/html text/css text/javascript \
            application/javascript application/json application/xml
    </IfModule>

    # ─── Cache de assets estáticos ─────────────────────────
    <IfModule mod_expires.c>
        ExpiresActive On
        ExpiresByType image/webp              "access plus 1 month"
        ExpiresByType image/jpeg              "access plus 1 month"
        ExpiresByType image/png               "access plus 1 month"
        ExpiresByType image/svg+xml           "access plus 1 week"
        ExpiresByType text/css                "access plus 1 week"
        ExpiresByType application/javascript  "access plus 1 week"
    </IfModule>

</VirtualHost>
