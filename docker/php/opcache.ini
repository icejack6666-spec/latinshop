; ============================================================
; docker/php/opcache.ini
; Montado en el contenedor PHP-FPM vía docker-compose.yml:
;
;   volumes:
;     - ./docker/php/opcache.ini:/usr/local/etc/php/conf.d/opcache.ini
;
; ============================================================

[opcache]
opcache.enable=1
opcache.enable_cli=1
opcache.memory_consumption=128
opcache.interned_strings_buffer=16
opcache.max_accelerated_files=4000

; En Docker con volúmenes montados, validate_timestamps=1
; permite ver cambios sin reiniciar el contenedor.
; En producción real (sin volúmenes bind), cambiar a 0.
opcache.validate_timestamps=1
opcache.revalidate_freq=2

; JIT — activo en contenedores PHP 8.x
opcache.jit=tracing
opcache.jit_buffer_size=128M

opcache.optimization_level=0x7FFEBFFF
opcache.max_wasted_percentage=10
opcache.fast_shutdown=1
