; ============================================================
; .user.ini — Configuración PHP por directorio
; ============================================================
; Este archivo es leído por PHP-FPM y mod_php en la mayoría
; de hostings compartidos (cPanel, Plesk, etc.)
; Se aplica al directorio donde se coloca (ROOT_PATH).
;
; IMPORTANTE: PHP cachea este archivo durante user_ini.cache_ttl
; segundos (defecto 300). Si cambias algo, espera ~5 min o
; reinicia PHP-FPM: sudo systemctl reload php8.3-fpm
; ============================================================

opcache.enable=1
opcache.memory_consumption=128
opcache.interned_strings_buffer=16
opcache.max_accelerated_files=4000
opcache.validate_timestamps=0
opcache.revalidate_freq=0
opcache.jit=tracing
opcache.jit_buffer_size=128M
opcache.fast_shutdown=1
opcache.optimization_level=0x7FFEBFFF

upload_max_filesize=5M
post_max_size=8M
max_execution_time=60
memory_limit=128M
