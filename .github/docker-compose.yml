# ============================================================
# docker-compose.yml — Latin Shop
# Stack: PHP 8.3 + Apache + MySQL 8.0 + Redis + phpMyAdmin
# ============================================================
services:

  # ──────────────────────────────────────────────────────────
  # APP — PHP 8.3 + Apache
  # ──────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_ENV: ${APP_ENV:-production}
    container_name: latinshop_app
    restart: unless-stopped
    env_file: .env
    environment:
      DB_HOST: db
      DB_NAME: ${DB_NAME:-latinshop_db}
      DB_USER: ${DB_USER:-latinshop}
      DB_PASS: ${DB_PASS}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASS: ${REDIS_PASS:-}
      APP_ENV: ${APP_ENV:-production}
    volumes:
      # Código fuente (desarrollo: montar en vivo; producción: se copia en build)
      - ./:/var/www/html:ro
      # Storage persistente fuera del public
      - latinshop_storage:/var/www/storage
      # Logs accesibles desde el host
      - ./logs:/var/www/html/logs
    networks:
      - latinshop_net
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${APP_PORT:-8080}:80"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ──────────────────────────────────────────────────────────
  # DB — MySQL 8.0
  # ──────────────────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: latinshop_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASS}
      MYSQL_DATABASE: ${DB_NAME:-latinshop_db}
      MYSQL_USER: ${DB_USER:-latinshop}
      MYSQL_PASSWORD: ${DB_PASS}
    volumes:
      - latinshop_db_data:/var/lib/mysql
      # Scripts de inicialización (se ejecutan solo si el volumen está vacío)
      - ./database/migrations:/docker-entrypoint-initdb.d:ro
    networks:
      - latinshop_net
    ports:
      - "${DB_PORT:-3307}:3306"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
      - --innodb-buffer-pool-size=256M
      - --slow-query-log=1
      - --slow-query-log-file=/var/log/mysql/slow.log
      - --long-query-time=2
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASS}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ──────────────────────────────────────────────────────────
  # REDIS — Cache + Sesiones
  # ──────────────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: latinshop_redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASS:-}
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
      --save 60 1000
      --appendonly yes
    volumes:
      - latinshop_redis_data:/data
    networks:
      - latinshop_net
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ──────────────────────────────────────────────────────────
  # phpMyAdmin — solo en desarrollo/staging
  # ──────────────────────────────────────────────────────────
  phpmyadmin:
    image: phpmyadmin:5.2
    container_name: latinshop_pma
    restart: unless-stopped
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASS}
      PMA_ABSOLUTE_URI: http://localhost:${PMA_PORT:-8081}/
    networks:
      - latinshop_net
    ports:
      - "${PMA_PORT:-8081}:80"
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - dev   # Solo se levanta con: docker compose --profile dev up

# ──────────────────────────────────────────────────────────
# Redes
# ──────────────────────────────────────────────────────────
networks:
  latinshop_net:
    driver: bridge

# ──────────────────────────────────────────────────────────
# Volúmenes persistentes
# ──────────────────────────────────────────────────────────
volumes:
  latinshop_db_data:
    driver: local
  latinshop_redis_data:
    driver: local
  latinshop_storage:
    driver: local
