# ============================================================
# cd.yml — Latin Shop CD
# Ejecuta en: push a main (merge de PR aprobado)
# Pasos: build imagen Docker → push a registry → deploy SSH
# ============================================================
name: CD — Deploy Producción

on:
  push:
    branches: [main]
  # Permite ejecutar manualmente desde la UI de GitHub
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: "Forzar rebuild completo de la imagen"
        required: false
        default: "false"
        type: boolean

concurrency:
  group: deploy-production
  cancel-in-progress: false  # No cancelar deploys en curso

jobs:

  # ────────────────────────────────────────────────────────────
  # JOB 1: Build y push de imagen Docker
  # ────────────────────────────────────────────────────────────
  build:
    name: "Build & Push Docker Image"
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
      image_digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker meta (tags y labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository_owner }}/latinshop
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=Latin Shop
            org.opencontainers.image.description=PHP 8.3 + Apache
            org.opencontainers.image.vendor=Latin Shop

      - name: Login en GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: buildx-${{ github.sha }}
          restore-keys: |
            buildx-

      - name: Build y Push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_ENV=production
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max
          platforms: linux/amd64

      # Evitar que el cache crezca sin límite
      - name: Mover cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

      - name: Resumen del build
        run: |
          echo "## 🐳 Docker Build" >> $GITHUB_STEP_SUMMARY
          echo "- **Tag:** ${{ steps.meta.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Digest:** ${{ steps.build.outputs.digest }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Imagen:** ghcr.io/${{ github.repository_owner }}/latinshop" >> $GITHUB_STEP_SUMMARY

  # ────────────────────────────────────────────────────────────
  # JOB 2: Deploy al servidor de producción vía SSH
  # ────────────────────────────────────────────────────────────
  deploy:
    name: "Deploy → Producción"
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: production
      url: https://latln-shop.com

    steps:
      - name: Checkout (solo para tener docker-compose.yml)
        uses: actions/checkout@v4

      - name: Instalar SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Agregar host al known_hosts
        run: |
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy en servidor
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT || '22' }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          IMAGE_TAG: ${{ needs.build.outputs.image_tag }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
          REPO_OWNER: ${{ github.repository_owner }}
        run: |
          ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" bash << 'ENDSSH'
            set -e

            echo "────────────────────────────────────────"
            echo " Latin Shop — Deploy en curso"
            echo " Tag: $IMAGE_TAG"
            echo "────────────────────────────────────────"

            cd "$DEPLOY_PATH"

            # Login al registry
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin

            # Actualizar docker-compose.yml si hubo cambios
            git pull --ff-only origin main 2>/dev/null || true

            # Pull de la nueva imagen
            docker pull "ghcr.io/$REPO_OWNER/latinshop:latest"

            # Recrear solo el servicio app con zero-downtime básico
            docker compose up -d --no-deps --force-recreate app

            # Verificar que la app respondió
            sleep 5
            if ! curl -sf http://localhost:8080/ > /dev/null; then
              echo "❌ Health check falló. Haciendo rollback..."
              docker compose up -d --no-deps --force-recreate --pull never app
              exit 1
            fi

            # Limpiar imágenes antiguas
            docker image prune -f

            echo "✅ Deploy completado exitosamente."
          ENDSSH

      - name: Notificar resultado en GitHub
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "## ✅ Deploy exitoso" >> $GITHUB_STEP_SUMMARY
          else
            echo "## ❌ Deploy fallido" >> $GITHUB_STEP_SUMMARY
          fi
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Actor:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Hora:** $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_STEP_SUMMARY
