; ============================================================
; opcache.ini — Configuración OPcache para LatinShop
; ============================================================
; UBICACIÓN SEGÚN ENTORNO:
;
;   Apache + mod_php (shared hosting / cPanel):
;     Copiar en ROOT_PATH/.user.ini
;     O agregar via php_value en .htaccess (ver abajo)
;
;   Apache + PHP-FPM (VPS / Docker):
;     Copiar en /etc/php/8.3/fpm/conf.d/99-latinshop-opcache.ini
;     O en /usr/local/etc/php/conf.d/opcache-latinshop.ini
;
;   XAMPP local:
;     Pegar el bloque [opcache] en php.ini de XAMPP
;
; VERIFICAR que OPcache esté habilitado:
;   php -r "var_dump(function_exists('opcache_get_status'));"
;   → bool(true)  ← correcto
; ============================================================

[opcache]

; ── Activación ───────────────────────────────────────────────
opcache.enable=1
opcache.enable_cli=0

; ── Memoria ──────────────────────────────────────────────────
; 128 MB es suficiente para LatinShop (~50 archivos PHP)
; Sube a 256 si agregas más módulos pesados
opcache.memory_consumption=128
opcache.interned_strings_buffer=16
opcache.max_accelerated_files=4000

; ── Revalidación ─────────────────────────────────────────────
; production: timestamps desactivados (máximo rendimiento)
; development: cambiar a 1 con revalidate_freq=0
opcache.validate_timestamps=0
opcache.revalidate_freq=0

; ── JIT (PHP 8.x) ────────────────────────────────────────────
; tracing = 1255 → JIT agresivo para código repetitivo
; buffer de 128 MB para el JIT
opcache.jit=tracing
opcache.jit_buffer_size=128M

; ── Optimización ─────────────────────────────────────────────
opcache.optimization_level=0x7FFEBFFF
opcache.max_wasted_percentage=10
opcache.fast_shutdown=1
opcache.enable_file_override=0

; ── Seguridad ────────────────────────────────────────────────
; Desactiva la API de estado en producción si no la usas
; (se puede reactivar para el panel admin)
opcache.restrict_api=

; ── Comentario para desarrollo ───────────────────────────────
; En .env con APP_ENV=development, el OPcacheService.php
; fuerza validate_timestamps=1 en runtime donde sea posible.
